<!DOCTYPE html>
<html lang="pt">
  <head>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&display=swap"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="shortcut icon" href="%PUBLIC_URL%/favicon.ico">
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="viewport"
      content="minimum-scale=1, initial-scale=1, width=device-width, shrink-to-fit=no, user-scalable=no"
    />
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <style>
      /* Reset e configurações básicas */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        overflow: hidden;
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }
      
      html {
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
      }

      /* Tela de loading - fundo preto */
      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000000;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        opacity: 1;
        transition: opacity 0.6s ease-out;
        overflow: hidden;
      }

      /* Glow sutil no fundo */
      #splash-screen::before {
        content: '';
        position: absolute;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(59,130,246,0.08) 0%, transparent 70%);
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        animation: glow-pulse 4s ease-in-out infinite;
      }

      @keyframes glow-pulse {
        0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
        50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
      }

      #splash-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        z-index: 10;
        animation: fadeInUp 0.8s ease-out;
      }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* Logo */
      .logo-container {
        margin-bottom: 48px;
      }

      .logo-container img {
        width: 120px;
        height: auto;
        filter: drop-shadow(0 0 30px rgba(59,130,246,0.3));
        animation: logo-breathe 3s ease-in-out infinite;
      }

      @keyframes logo-breathe {
        0%, 100% { transform: scale(1); filter: drop-shadow(0 0 30px rgba(59,130,246,0.3)); }
        50% { transform: scale(1.03); filter: drop-shadow(0 0 40px rgba(59,130,246,0.5)); }
      }

      /* Subtítulo */
      .loading-subtitle {
        font-size: 15px;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.5);
        margin-bottom: 40px;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      /* Loader moderno - 3 dots */
      .modern-loader {
        display: flex;
        gap: 8px;
        margin-bottom: 32px;
      }

      .loader-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #3b82f6;
        animation: dot-bounce 1.4s ease-in-out infinite;
      }

      .loader-dot:nth-child(1) { animation-delay: 0s; }
      .loader-dot:nth-child(2) { animation-delay: 0.16s; }
      .loader-dot:nth-child(3) { animation-delay: 0.32s; }

      @keyframes dot-bounce {
        0%, 80%, 100% { transform: scale(0.4); opacity: 0.3; }
        40% { transform: scale(1); opacity: 1; }
      }

      /* Barra de progresso minimalista */
      .progress-container {
        width: 280px;
        max-width: 80vw;
        margin-bottom: 20px;
      }

      .progress-bar {
        width: 100%;
        height: 3px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 4px;
        overflow: hidden;
      }

      .progress {
        height: 100%;
        background: linear-gradient(90deg, #3b82f6, #60a5fa);
        border-radius: 4px;
        width: 0;
        transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 0 12px rgba(59,130,246,0.5);
        position: relative;
      }

      /* Texto de progresso */
      .progress-text {
        font-size: 13px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.35);
        text-align: center;
        margin-top: 12px;
        font-family: 'Roboto Mono', monospace;
      }

      /* Status */
      .status-message {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.3);
        margin-top: 20px;
        min-height: 20px;
        animation: fadeIn 0.5s ease;
        font-weight: 400;
        max-width: 300px;
        text-align: center;
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      /* Fade out */
      #splash-screen.fade-out {
        opacity: 0;
        transition: opacity 0.6s ease-out;
      }

      /* Responsividade */
      @media (max-width: 768px) {
        .logo-container img { width: 100px; }
        .loading-subtitle { font-size: 13px; }
        .progress-container { width: 240px; }
      }

      @media (max-width: 480px) {
        .logo-container img { width: 80px; }
        .loading-subtitle { font-size: 12px; }
        .progress-container { width: 200px; }
      }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>

    <!-- Issue workaround for React v16. -->
    <script>
      // See https://github.com/facebook/react/issues/20829#issuecomment-802088260
      if (!crossOriginIsolated) SharedArrayBuffer = ArrayBuffer;
    </script>
  </head>

  <body>
    <div id="splash-screen">
      <div id="splash-content">
        <div class="logo-container">
          <img id="splash-logo" src="logo-black.png" alt="MultiFlow" />
        </div>
        
        <p class="loading-subtitle">Carregando sua experiência...</p>
        
        <div class="modern-loader">
          <div class="loader-dot"></div>
          <div class="loader-dot"></div>
          <div class="loader-dot"></div>
        </div>
        
        <div class="progress-container">
          <div class="progress-bar">
            <div class="progress" id="progress-bar"></div>
          </div>
          <div class="progress-text" id="progress-text">0%</div>
        </div>
        
        <div class="status-message" id="status-message">Inicializando...</div>
      </div>
    </div>

    <div id="root"></div>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <script>
      let progress = 0;
      const progressBar = document.getElementById("progress-bar");
      const progressText = document.getElementById("progress-text");
      const statusMessage = document.getElementById("status-message");
      
      const statusMessages = [
        "Inicializando aplicação...",
        "Carregando componentes...",
        "Configurando interface...", 
        "Conectando serviços...",
        "Preparando o sistema...",
        "Finalizando carregamento..."
      ];
      
      let messageIndex = 0;
      
      const interval = setInterval(() => {
        if (progress < 25) {
          progress += Math.random() * 4 + 2;
        } else if (progress < 50) {
          progress += Math.random() * 3 + 1;
        } else if (progress < 80) {
          progress += Math.random() * 2 + 0.5;
        } else if (progress < 95) {
          progress += (95 - progress) / 10;
        }
        
        // Atualizar barra de progresso
        const currentProgress = Math.min(progress, 100);
        progressBar.style.width = currentProgress + "%";
        progressText.textContent = Math.floor(currentProgress) + "%";
        
        // Atualizar mensagem de status
        const newMessageIndex = Math.floor((currentProgress / 100) * statusMessages.length);
        if (newMessageIndex !== messageIndex && newMessageIndex < statusMessages.length) {
          messageIndex = newMessageIndex;
          statusMessage.style.opacity = '0';
          setTimeout(() => {
            statusMessage.textContent = statusMessages[messageIndex];
            statusMessage.style.opacity = '1';
          }, 200);
        }
        
        if (progress >= 100) {
          clearInterval(interval);
          statusMessage.textContent = "Redirecionando...";
          
          setTimeout(() => {
            const splashScreen = document.getElementById("splash-screen");
            splashScreen.classList.add('fade-out');
            
            setTimeout(() => {
              splashScreen.remove();
            }, 1000);
          }, 1500);
        }
      }, 120);
      
      // Função para finalizar o progresso externamente
      window.finishProgress = () => {
        progress = 100;
      };
      
      // Garantir que a tela seja removida caso o React carregue muito rápido
      window.addEventListener('load', () => {
        setTimeout(() => {
          if (progress < 85) {
            progress = 85;
          }
        }, 800);
      });
      
      // Timeout de segurança para remover a tela após tempo máximo
      setTimeout(() => {
        if (document.getElementById("splash-screen")) {
          window.finishProgress();
        }
      }, 15000);
    </script>
  </body>
</html>
